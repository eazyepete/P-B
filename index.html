<!DOCTYPE html>
<html>
<head>
  <title>Our First App</title>

  <!-- ✅ Mobile optimization -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 60px;
      padding: 20px;
    }

    h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1em;
      opacity: 0.9;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .btn {
      margin-top: 15px;
      padding: 12px 25px;
      font-size: 16px;
      color: white;
      background: #ff7a18;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff9a3c;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 Our First App</h1>
    <p>Built by us. Now mobile-ready.</p>

    <div class="card">
      <h2>Welcome</h2>
      <p>This actually works on your phone now.</p>
      <button class="btn" onclick="sayHello()">Tap Me</button>
    </div>
  </div>

  <script>
    function sayHello() {
      alert("You just tapped your app on your phone 🚀");
    }
  </script>
</body>
</html>
