<!DOCTYPE html>
<html>
<head>
  <title>My First App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      color: white;
      background: #ff7a18;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff9a3c;
      transform: scale(1.05);
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      margin: 40px auto;
      width: 300px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 Our First App</h1>
    <p>Built by Pete and Brandon the bestest. Getting better every day.</p>

    <div class="card">
      <h2>Welcome</h2>
      <p>This is our starting point.</p>
      <button class="btn" onclick="sayHello()">Click Me</button>
    </div>
  </div>

  <script>
    function sayHello() {
      alert("Let’s gooo 🚀");
    }
  </script>
</body>
</html>
